plugins {
    id 'java'
    id 'application'
}

group = 'hafen'
version = '0.1.0'

// Use build-gradle/ (not the default build/) so it's clearly Gradle's output
// and sits alongside the Ant build's build-ant/ without clashing.
layout.buildDirectory = layout.projectDirectory.dir('build-gradle')

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation files('lib/jorbis-0.0.17.jar')
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'hafen.resedit.Main'
}

test {
    useJUnitPlatform()
}

tasks.named('jar') {
    manifest {
        attributes 'Main-Class': 'hafen.resedit.Main'
    }
    // Fat jar: fold the bundled Ogg-decoder (jorbis) classes in so `java -jar` works.
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
