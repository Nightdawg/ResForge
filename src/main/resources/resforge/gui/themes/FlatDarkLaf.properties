# IntelliJ-inspired dark palette: dark content surfaces, raised controls and
# structural contrast without the flatter medium-grey appearance of FlatDarkLaf.

@background = #1e1f22
@foreground = #dfe1e5
@disabledBackground = @background
@disabledForeground = #6f737a
@buttonBackground = #2b2d30
@componentBackground = #25272a
@menuBackground = #2b2d30
@selectionBackground = #2f5f91
@selectionForeground = #ffffff
@selectionInactiveBackground = #354052
@selectionInactiveForeground = @foreground
@accentColor = null
@accentBaseColor = #3574f0
@accentBase2Color = #3574f0

Component.borderColor = #43454a
Component.disabledBorderColor = #393b40
PopupMenu.borderColor = #43454a
Separator.foreground = #393b40

Panel.background = @background
SplitPane.background = #393b40
MenuBar.background = @menuBackground
MenuBar.borderColor = #393b40
ToolBar.background = @menuBackground
ToolBar.separatorColor = #43454a
TitlePane.background = @menuBackground

List.background = @background
Tree.background = @background
Table.background = #242629
Table.gridColor = #484b50
TableHeader.background = @componentBackground
TableHeader.separatorColor = #484b50
TableHeader.bottomSeparatorColor = #484b50
TextArea.background = @background
TextPane.background = @background
EditorPane.background = @background

ScrollBar.track = @background
ScrollBar.thumb = #45484d
ScrollBar.hoverTrackColor = #25272a
ScrollBar.hoverThumbColor = #5a5d63
ScrollBar.pressedThumbColor = #6b6f76
